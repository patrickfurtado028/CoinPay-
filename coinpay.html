<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAMBIO PROTOCOL | PREMIUM DAPP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script src="https://unpkg.com/scrollreveal"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;900&display=swap');
        
        body { background: #010208; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -2; }
        
        .glass-3d { 
            background: rgba(0, 255, 136, 0.02); 
            border: 1px solid rgba(0, 255, 136, 0.08); 
            border-radius: 24px; 
            backdrop-filter: blur(20px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-3d:hover { border-color: rgba(0, 255, 136, 0.4); box-shadow: 0 0 40px rgba(0, 255, 136, 0.08); }

        .btn-main {
            background: #00ff88; color: #000; font-weight: 900;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.4s; text-transform: uppercase;
        }

        .btn-coinpay {
            background: transparent; color: #00ff88; border: 1px solid #00ff88;
            padding: 8px 16px; border-radius: 8px; transition: 0.3s; text-transform: uppercase;
        }
        .btn-coinpay:hover { background: #00ff88; color: #000; }
    </style>
</head>
<body>

    <header class="max-w-7xl mx-auto p-4 md:p-6 mt-4">
        <nav class="flex justify-between items-center glass-3d px-6 py-4">
            <h1 class="text-xl font-black orbitron uppercase">CAMBIO<span class="text-[#00ff88]">PROTOCOL</span></h1>
            
            <div class="flex gap-4 items-center">
                <a href="/coinpay.html" class="btn-coinpay orbitron text-[10px]">COINPAY</a>
                
                <button onclick="abrirSeletor()" class="btn-main px-6 py-2 text-[10px] orbitron">CONNECT_WALLET</button>
            </div>
        </nav>
    </header>

    <script>
        // Função original de abrir seletor mantida
        function abrirSeletor() {
            document.getElementById("walletModal").style.display = "flex";
        }
    </script>
</body>
</html>
