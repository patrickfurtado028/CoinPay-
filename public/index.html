<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CAMBIO PROTOCOL | COINPAY WEB TERMINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Vercel Speed Insights -->
    <script defer src="/speed-insights-init.js"></script>
    <style>
        :root {
            --bg-main: #010208;
            --bg-panel: #0b0e14;
            --bg-input: #111622;
            --primary: #00ff88;
            --primary-glow: #00cc6e;
            --danger: #ff3b30;
            --text-main: #FFFFFF;
            --text-secondary: #8a99ad;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Container que simula o ecrã do telemóvel no site */
        .terminal-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 850px;
            background: var(--bg-main);
            border: 1px solid #1f293d;
            box-shadow: 0px 0px 30px rgba(0, 255, 136, 0.05);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* TELA DE CONEXÃO */
        #screen-auth {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding: 30px;
            text-align: center;
        }

        .logo-crypto {
            font-size: 60px;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .input-wallet {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid #1f293d;
            padding: 15px;
            color: white;
            font-size: 14px;
            text-align: center;
            border-radius: 6px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .btn-action {
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-action:hover { background: var(--primary-glow); }

        /* TELA DO PDV OPERACIONAL */
        #screen-pdv {
            display: none;
            flex-direction: column;
            flex: 1;
        }

        .header-pdv {
            background: var(--bg-panel);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f293d;
        }

        .wallet-badge {
            background: var(--bg-input);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .btn-disconnect {
            background: transparent;
            color: var(--danger);
            border: none;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
        }

        /* VISOR DE VALOR */
        .visor-container {
            background: var(--bg-panel);
            margin: 20px;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #1f293d;
            text-align: center;
        }

        .visor-title {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .visor-amount {
            font-size: 36px;
            font-weight: bold;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
        }

        .select-token {
            background: var(--bg-input);
            color: white;
            border: 1px solid #1f293d;
            padding: 4px;
            border-radius: 4px;
        }

        /* TECLADO NUMÉRICO FLUIDO */
        .keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 0 20px;
            flex: 1;
        }

        .key {
            background: var(--bg-input);
            border: none;
            color: white;
            font-size: 22px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.1s;
        }

        .key:active { background: var(--primary); color: black; }

        .footer-btn { padding: 20px; }

        /* MODAL DE PAGAMENTO (OVERLAY) */
        .modal-pay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-main);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 30px;
            box-sizing: border-box;
        }

        #qrcode {
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="terminal-container">

    <div id="screen-auth">
        <div class="logo-crypto">⟁</div>
        <h2 style="margin: 5px 0;">COINPAY WEB TERMINAL</h2>
        <p style="color: var(--text-secondary); font-size: 12px; margin-bottom: 40px;">Sincronize o endereço do nó lojista</p>
        
        <input type="text" id="wallet-input" class="input-wallet" placeholder="Cole sua carteira BSC (0x...)">
        <button class="btn-action" onclick="conectarNode()">CONECTAR VIA WEB3 PURE</button>
    </div>

    <div id="screen-pdv">
        <div class="header-pdv">
            <div>
                <div style="font-size: 11px; color: var(--primary);">● NODE ATIVO</div>
                <button class="btn-disconnect" onclick="desconectarNode()">✕ DESCONECTAR</button>
            </div>
            <div id="display-wallet" class="wallet-badge">0x00...0000</div>
        </div>
<button onclick="abrirCoinPay()" class="btn-coinpay px-4 py-2 text-[10px] orbitron flex items-center gap-2">
    <i class="fa-solid fa-wallet"></i> COINPAY TERMINAL
</button>
        function abrirCoinPay() {
    window.location.href = "CoinPay.html";
}
        <div class="visor-container">
            <div class="visor-title">
                <span>VALOR A RECEBER (BRL)</span>
                <select id="token-select" class="select-token">
                    <option value="BNB">BSC (BNB)</option>
                    <option value="CAMB">Cambio Token</option>
                </select>
            </div>
            <div id="visor-real" class="visor-amount">R$ 0,00</div>
        </div>

        <div class="keyboard">
            <button class="key" onclick="pressKey('1')">1</button>
            <button class="key" onclick="pressKey('2')">2</button>
            <button class="key" onclick="pressKey('3')">3</button>
            <button class="key" onclick="pressKey('4')">4</button>
            <button class="key" onclick="pressKey('5')">5</button>
            <button class="key" onclick="pressKey('6')">6</button>
            <button class="key" onclick="pressKey('7')">7</button>
            <button class="key" onclick="pressKey('8')">8</button>
            <button class="key" onclick="pressKey('9')">9</button>
            <button class="key" style="color: var(--danger)" onclick="pressKey('C')">C</button>
            <button class="key" onclick="pressKey('0')">0</button>
            <button class="key" onclick="pressKey('⌫')">⌫</button>
        </div>

        <div class="footer-btn">
            <button class="btn-action" onclick="solicitarCheckout()">GERAR COBRANÇA BLOCKCHAIN</button>
        </div>
    </div>

    <div id="modal-payment" class="modal-pay">
        <div style="font-size: 12px; color: var(--text-secondary);">ESCANEAR PARA LIQUIDAR</div>
        <h2 id="modal-crypto-amount" style="color: var(--primary); margin: 10px 0; font-family: monospace;">0.0000 BNB</h2>
        
        <div id="qrcode"></div>
        
        <div style="color: var(--text-secondary); font-size: 13px; margin-bottom: 30px;" id="modal-brl-amount">Total: R$ 0,00</div>
        <button class="btn-action" style="background: var(--danger); color: white;" onclick="fecharModal()">CANCELAR ORDEM</button>
    </div>

</div>

<script>
    let rawInput = "";
    let carteiraSalva = "";

    // Verificar se o usuário já fez login anteriormente (Auto-Profile Pull)
    window.onload = function() {
        let cache = localStorage.getItem("coinpay_wallet");
        if(cache) {
            carteiraSalva = cache;
            entrarNoPainel();
        }
    }

    function conectarNode() {
        let wallet = document.getElementById("wallet-input").value.trim();
        if(wallet.startsWith("0x") && wallet.length === 42) {
            localStorage.setItem("coinpay_wallet", wallet);
            carteiraSalva = wallet;
            entrarNoPainel();
        } else {
            alert("Por favor, introduza um endereço de carteira válido da rede BSC.");
        }
    }

    function entrarNoPainel() {
        document.getElementById("screen-auth").style.display = "none";
        document.getElementById("screen-pdv").style.display = "flex";
        document.getElementById("display-wallet").innerText = carteiraSalva.substring(0,6) + "..." + carteiraSalva.substring(38);
    }

    function desconectarNode() {
        localStorage.removeItem("coinpay_wallet");
        document.getElementById("screen-auth").style.display = "flex";
        document.getElementById("screen-pdv").style.display = "none";
        rawInput = "";
        atualizarVisor();
    }

    function pressKey(val) {
        if(val === 'C') { rawInput = ""; }
        else if(val === '⌫') { rawInput = rawInput.slice(0, -1); }
        else { if(rawInput.length < 8) rawInput += val; }
        atualizarVisor();
    }

    function atualizarVisor() {
        if(!rawInput) {
            document.getElementById("visor-real").innerText = "R$ 0,00";
            return;
        }
        let floatVal = parseFloat(rawInput) / 100;
        document.getElementById("visor-real").innerText = floatVal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    async function solicitarCheckout() {
        if(!rawInput || rawInput === "0") return;
        let token = document.getElementById("token-select").value;
        let brl = parseFloat(rawInput) / 100;
        
        let cryptoAmount = 0;
        let precoCripto = 1;

        if(token === "CAMB") {
            precoCripto = 0.041; // Cotação fixa simulada do Cambio Token
            cryptoAmount = (brl * 1.01) / precoCripto; // Taxa de 1%
        } else {
            // Puxa cotação em tempo real da BNB via CoinGecko
            try {
                let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=binancecoin&vs_currencies=brl");
                let data = await res.json();
                precoCripto = data.binancecoin.brl;
                cryptoAmount = (brl * 1.05) / precoCripto; // Taxa de 5%
            } catch(e) {
                alert("Erro ao buscar cotação de rede."); return;
            }
        }

        // Configuração do QR Code com o payload correto Web3
        document.getElementById("qrcode").innerHTML = "";
        let payload = `ethereum:${carteiraSalva}@56?value=${cryptoAmount.toFixed(18)}`;
        new QRCode(document.getElementById("qrcode"), { text: payload, width: 220, height: 220 });

        document.getElementById("modal-crypto-amount").innerText = `${cryptoAmount.toFixed(5)} ${token}`;
        document.getElementById("modal-brl-amount").innerText = `Total com taxas: R$ ${(token === "CAMB" ? brl*1.01 : brl*1.05).toFixed(2)}`;
        document.getElementById("modal-payment").style.display = "flex";
    }

    function fecharModal() {
        document.getElementById("modal-payment").style.display = "none";
        rawInput = "";
        atualizarVisor();
    }
</script>
</body>
</html>
